<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bloco de Notas</title>
<style>
body {
    font-family: sans-serif;
    background: #f2f2f2;
    padding: 10px;
}
textarea {
    width: 100%;
    height: 300px;
    font-size: 16px;
}
button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    font-size: 18px;
}
</style>
</head>
<body>

<h2>Bloco de Notas</h2>

<textarea id="texto" placeholder="Escreve aqui..."></textarea>

<button onclick="guardar()">Guardar</button>

<script>
function guardar() {
    var t = document.getElementById("texto").value;
    localStorage.setItem("notas", t);
    alert("Guardado!");
}

window.onload = function() {
    var t = localStorage.getItem("notas");
    if (t) document.getElementById("texto").value = t;
}
</script>

</body>
</html>
