<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notas</title>
<style>
body {
    font-family: sans-serif;
    background: #f2f2f2;
    padding: 10px;
    color: #000;
}
.dark {
    background: #111;
    color: #eee;
}
textarea {
    width: 100%;
    height: 200px;
    font-size: 16px;
}
input[type="button"], select, input[type="text"] {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    font-size: 16px;
}
.notaItem {
    background: #fff8b3;
    padding: 10px;
    margin-bottom: 12px;
    border: 1px solid #e6d97a;
}
.dark .notaItem {
    background: #333;
    border-color: #555;
}
</style>
</head>
<body onload="mostrarNotas()">

<h2>Notas</h2>

<input id="pesquisa" type="text" placeholder="Pesquisar...">
<input type="button" value="Pesquisar" onclick="mostrarNotas()">

<input type="button" value="Criar nova nota" onclick="novaNota()">
<input type="button" value="Modo escuro" onclick="toggleDark()">

<select id="tamanho" onchange="ajustarTamanho()">
    <option value="14">Letra pequena</option>
    <option value="16" selected>Letra média</option>
    <option value="20">Letra grande</option>
</select>

<div id="editor" style="display:none;">
    <textarea id="texto"></textarea>
    <input type="button" value="Guardar" onclick="guardar()">
</div>

<div id="listaNotas"></div>

<script>
var notaAtual = null;

function total() {
    var t = localStorage.getItem("total_notas");
    if (!t) return 0;
    return parseInt(t);
}

function novaNota() {
    notaAtual = null;
    document.getElementById("texto").value = "";
    document.getElementById("editor").style.display = "block";
}

function guardar() {
    var texto = document.getElementById("texto").value;

    if (notaAtual === null) {
        var n = total() + 1;
        localStorage.setItem("nota_" + n, texto);
        localStorage.setItem("total_notas", n);
    } else {
        localStorage.setItem("nota_" + notaAtual, texto);
    }

    mostrarNotas();
    alert("Guardado!");
}

function editar(id) {
    notaAtual = id;
    var t = localStorage.getItem("nota_" + id);
    if (!t) t = "";
    document.getElementById("texto").value = t;
    document.getElementById("editor").style.display = "block";
}

function apagar(id) {
    localStorage.removeItem("nota_" + id);
    mostrarNotas();
}

function mostrarNotas() {
    var div = document.getElementById("listaNotas");
    var termo = document.getElementById("pesquisa").value.toLowerCase();
    var t = total();
    var html = "";

    for (var i = 1; i <= t; i++) {
        var texto = localStorage.getItem("nota_" + i);
        if (!texto) continue;

        if (termo && texto.toLowerCase().indexOf(termo) === -1) continue;

        html += "<div class='notaItem'>";
        html += "<div>" + texto.replace(/</g,"&lt;") + "</div>";
        html += "<input type='button' value='Editar' onclick='editar(" + i + ")'>";
        html += "<input type='button' value='Apagar' onclick='apagar(" + i + ")'>";
        html += "</div>";
    }

    div.innerHTML = html;
}

function toggleDark() {
    var c = document.body.className;
    if (c.indexOf("dark") === -1) {
        document.body.className = c + " dark";
    } else {
        document.body.className = c.replace("dark", "");
    }
}

function ajustarTamanho() {
    var tam = document.getElementById("tamanho").value;
    document.getElementById("texto").style.fontSize = tam + "px";
}
</script>

</body>
</html>
