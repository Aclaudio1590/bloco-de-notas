<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notas</title>
<style>
body {
    font-family: sans-serif;
    background: #f2f2f2;
    padding: 10px;
    color: #000;
}
.dark {
    background: #111;
    color: #eee;
}
textarea {
    width: 100%;
    height: 200px;
    font-size: 16px;
}
button, select, input {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    font-size: 16px;
}

/* Cartões simples */
.notaItem {
    background: #fff8b3;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #e6d97a;
}
.dark .notaItem {
    background: #333;
    border-color: #555;
}
</style>
</head>
<body>

<h2>Notas</h2>

<input id="pesquisa" placeholder="Pesquisar..." oninput="mostrarNotas()">

<button onclick="novaNota()">Criar nova nota</button>
<button onclick="toggleDark()">Modo escuro</button>

<select id="tamanho" onchange="ajustarTamanho()">
    <option value="14">Letra pequena</option>
    <option value="16" selected>Letra média</option>
    <option value="20">Letra grande</option>
</select>

<!-- Editor -->
<div id="editor" style="display:none;">
    <textarea id="texto"></textarea>
    <button onclick="guardar()">Guardar</button>
</div>

<!-- Lista -->
<div id="listaNotas"></div>

<script>
let notaAtual = null;

function total() {
    return parseInt(localStorage.getItem("total_notas") || "0");
}

function novaNota() {
    notaAtual = null;
    document.getElementById("texto").value = "";
    document.getElementById("editor").style.display = "block";
}

function guardar() {
    let texto = document.getElementById("texto").value;

    if (notaAtual === null) {
        let n = total() + 1;
        localStorage.setItem("nota_" + n, texto);
        localStorage.setItem("total_notas", n);
    } else {
        localStorage.setItem("nota_" + notaAtual, texto);
    }

    mostrarNotas();
    alert("Guardado!");
}

function editar(id) {
    notaAtual = id;
    document.getElementById("texto").value = localStorage.getItem("nota_" + id);
    document.getElementById("editor").style.display = "block";
}

function apagar(id) {
    localStorage.removeItem("nota_" + id);
    mostrarNotas();
}

function mostrarNotas() {
    let div = document.getElementById("listaNotas");
    let termo = document.getElementById("pesquisa").value.toLowerCase();

    div.innerHTML = "";

    let t = total();

    for (let i = 1; i <= t; i++) {
        let texto = localStorage.getItem("nota_" + i);
        if (!texto) continue;

        if (!texto.toLowerCase().includes(termo)) continue;

        let bloco = document.createElement("div");
        bloco.className = "notaItem";

        bloco.innerHTML =
            "<div>" + texto + "</div>" +
            "<button onclick='editar(" + i + ")'>Editar</button>" +
            "<button onclick='apagar(" + i + ")'>Apagar</button>";

        div.appendChild(bloco);
    }
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

function ajustarTamanho() {
    let tam = document.getElementById("tamanho").value;
    document.getElementById("texto").style.fontSize = tam + "px";
}

window.onload = mostrarNotas;
</script>

</body>
</html>
