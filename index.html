<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notas</title>
<style>
body {
    font-family: sans-serif;
    background: #f2f2f2;
    padding: 10px;
    color: #000;
}
.dark {
    background: #111;
    color: #eee;
}
textarea {
    width: 100%;
    height: 200px;
    font-size: 16px;
}
button, select, input {
    width: 100%;
    padding: 8px;
    margin-top: 8px;
    font-size: 16px;
}

/* Cartões estilo Google Keep */
#listaNotas {
    margin-top: 15px;
}
.notaItem {
    background: #fff8b3;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 6px;
    border: 1px solid #e6d97a;
}
.dark .notaItem {
    background: #333;
    border-color: #555;
}
.notaTexto {
    white-space: pre-wrap;
    margin-bottom: 8px;
}
.notaData {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 6px;
}
.pinned {
    border-left: 6px solid #ff9800;
}
</style>
</head>
<body>

<h2>Notas</h2>

<input id="pesquisa" placeholder="Pesquisar..." oninput="mostrarNotas()">

<button onclick="novaNota()">Criar nova nota</button>
<button onclick="toggleDark()">Modo escuro</button>

<select id="tamanho" onchange="ajustarTamanho()">
    <option value="14">Letra pequena</option>
    <option value="16" selected>Letra média</option>
    <option value="20">Letra grande</option>
</select>

<!-- Editor -->
<div id="editor" style="display:none;">
    <textarea id="texto"></textarea>
    <button onclick="guardar()">Guardar</button>
</div>

<!-- Lista -->
<div id="listaNotas"></div>

<script>
let notaAtual = null;

function carregarNotas() {
    return JSON.parse(localStorage.getItem("notas_keep")) || [];
}

function guardarNotas(notas) {
    localStorage.setItem("notas_keep", JSON.stringify(notas));
}

function novaNota() {
    notaAtual = null;
    document.getElementById("texto").value = "";
    document.getElementById("editor").style.display = "block";
}

function guardar() {
    let texto = document.getElementById("texto").value;
    let notas = carregarNotas();

    if (notaAtual === null) {
        notas.push({
            id: Date.now(),
            texto: texto,
            data: new Date().toLocaleString(),
            pinned: false
        });
    } else {
        let n = notas.find(n => n.id === notaAtual);
        if (n) {
            n.texto = texto;
            n.data = new Date().toLocaleString();
        }
    }

    guardarNotas(notas);
    mostrarNotas();
    alert("Guardado!");
}

function editar(id) {
    let notas = carregarNotas();
    let n = notas.find(n => n.id === id);
    if (!n) return;

    notaAtual = id;
    document.getElementById("texto").value = n.texto;
    document.getElementById("editor").style.display = "block";
}

function apagar(id) {
    let notas = carregarNotas();
    notas = notas.filter(n => n.id !== id);
    guardarNotas(notas);
    mostrarNotas();
}

function fixar(id) {
    let notas = carregarNotas();
    let n = notas.find(n => n.id === id);
    if (!n) return;

    n.pinned = !n.pinned;
    guardarNotas(notas);
    mostrarNotas();
}

function mostrarNotas() {
    let notas = carregarNotas();
    let div = document.getElementById("listaNotas");
    let termo = document.getElementById("pesquisa").value.toLowerCase();

    div.innerHTML = "";

    // Filtrar por pesquisa
    notas = notas.filter(n => n.texto.toLowerCase().includes(termo));

    // Ordenar: fixadas primeiro
    notas.sort((a, b) => b.pinned - a.pinned);

    notas.forEach(n => {
        let bloco = document.createElement("div");
        bloco.className = "notaItem";
        if (n.pinned) bloco.classList.add("pinned");

        bloco.innerHTML =
            "<div class='notaTexto'>" + (n.texto || "(vazia)") + "</div>" +
            "<div class='notaData'>" + n.data + "</div>" +
            "<button onclick='editar(" + n.id + ")'>Editar</button>" +
            "<button onclick='apagar(" + n.id + ")'>Apagar</button>" +
            "<button onclick='fixar(" + n.id + ")'>" + (n.pinned ? "Desafixar" : "Fixar") + "</button>";

        div.appendChild(bloco);
    });
}

function toggleDark() {
    document.body.classList.toggle("dark");
}

function ajustarTamanho() {
    let tam = document.getElementById("tamanho").value;
    document.getElementById("texto").style.fontSize = tam + "px";
}

window.onload = mostrarNotas;
</script>

</body>
</html>
